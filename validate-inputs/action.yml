# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# permissions:
#   - (none required)  # Validation-only action
---
name: 'Validate Inputs'
description: 'Centralized Python-based input validation for GitHub Actions with PCRE regex support'
author: 'Ismo Vuorinen'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  action:
    description: 'Action name to validate (alias for action-type)'
    required: false
  action-type:
    description: 'Type of action to validate (e.g., csharp-publish, docker-build, eslint-lint)'
    required: false
  rules-file:
    description: 'Path to validation rules file'
    required: false
  fail-on-error:
    description: 'Whether to fail on validation errors'
    required: false
    default: 'true'

  # Common inputs that can be validated across actions
  token:
    description: 'GitHub token for authentication'
    required: false
  namespace:
    description: 'Namespace/username for validation'
    required: false
  email:
    description: 'Email address for validation'
    required: false
  username:
    description: 'Username for validation'
    required: false

  # Version-related inputs
  dotnet-version:
    description: '.NET version string'
    required: false
  terraform-version:
    description: 'Terraform version string'
    required: false
  tflint-version:
    description: 'TFLint version string'
    required: false
  node-version:
    description: 'Node.js version string'
    required: false
  force-version:
    description: 'Force version override'
    required: false
  default-version:
    description: 'Default version fallback'
    required: false

  # Docker-related inputs
  image-name:
    description: 'Docker image name'
    required: false
  tag:
    description: 'Docker image tag'
    required: false
  architectures:
    description: 'Target architectures'
    required: false
  dockerfile:
    description: 'Dockerfile path'
    required: false
  context:
    description: 'Docker build context'
    required: false
  build-args:
    description: 'Docker build arguments'
    required: false
  buildx-version:
    description: 'Docker Buildx version'
    required: false

  # Numeric inputs
  max-retries:
    description: 'Maximum retry attempts'
    required: false
  image-quality:
    description: 'Image quality percentage'
    required: false
  png-quality:
    description: 'PNG quality percentage'
    required: false
  parallel-builds:
    description: 'Number of parallel builds'
    required: false
  days-before-stale:
    description: 'Number of days before marking as stale'
    required: false
  days-before-close:
    description: 'Number of days before closing stale items'
    required: false

  # File/path inputs
  pre-commit-config:
    description: 'Pre-commit configuration file path'
    required: false
  base-branch:
    description: 'Base branch name'
    required: false

  # Boolean inputs
  dry-run:
    description: 'Dry run mode'
    required: false
  is-fiximus:
    description: 'Use Fiximus bot'
    required: false
  is_fiximus:
    description: 'Deprecated alias for is-fiximus (backward compatibility)'
    required: false

  # Release inputs
  prefix:
    description: 'Release tag prefix'
    required: false

  # CodeQL-specific inputs
  language:
    description: 'Language to analyze (for CodeQL)'
    required: false
  queries:
    description: 'CodeQL queries to run'
    required: false
  packs:
    description: 'CodeQL query packs'
    required: false
  config-file:
    description: 'CodeQL configuration file path'
    required: false
  config:
    description: 'CodeQL configuration YAML string'
    required: false
  build-mode:
    description: 'Build mode for compiled languages'
    required: false
  source-root:
    description: 'Source code root directory'
    required: false
  category:
    description: 'Analysis category'
    required: false
  checkout-ref:
    description: 'Git reference to checkout'
    required: false
  working-directory:
    description: 'Working directory for analysis'
    required: false
  upload-results:
    description: 'Upload results to GitHub Security'
    required: false
  ram:
    description: 'Memory in MB for CodeQL'
    required: false
  threads:
    description: 'Number of threads for CodeQL'
    required: false
  output:
    description: 'Output path for SARIF results'
    required: false
  skip-queries:
    description: 'Skip running queries'
    required: false
  add-snippets:
    description: 'Add code snippets to SARIF'
    required: false

  # Security-scan specific inputs
  gitleaks-license:
    description: 'Gitleaks license key'
    required: false
  gitleaks-config:
    description: 'Gitleaks configuration file path'
    required: false
  trivy-severity:
    description: 'Trivy severity levels to scan'
    required: false
  trivy-scanners:
    description: 'Trivy scanner types to run'
    required: false
  trivy-timeout:
    description: 'Trivy scan timeout'
    required: false
  actionlint-enabled:
    description: 'Enable actionlint scanning'
    required: false

  # ── N-108: inputs forwarded by N-095-migrated callers ────────────────────
  # These were silently dropped before this section was added because composite
  # actions do not auto-expose undeclared `with:` keys as INPUT_* env vars
  # (https://docs.github.com/en/actions/sharing-automations/creating-actions/metadata-syntax-for-github-actions).
  # Without these declarations the migrated callers' `with:` blocks emitted
  # "Unexpected input" warnings and validator.py never saw the values.

  # Version inputs (action-specific tool versions)
  autopep8-version:
    description: 'autopep8 version (python-lint-fix)'
    required: false
  eslint-version:
    description: 'ESLint version (eslint-lint)'
    required: false
  flake8-version:
    description: 'flake8 version (python-lint-fix)'
    required: false
  go-version:
    description: 'Go version (go-build, go-lint)'
    required: false
  golangci-lint-version:
    description: 'golangci-lint version (go-lint)'
    required: false
  package-version:
    description: 'Package version to publish (npm-publish)'
    required: false
  php-version:
    description: 'PHP version (php-tests)'
    required: false
  prettier-version:
    description: 'Prettier version (prettier-lint)'
    required: false
  python-version:
    description: 'Python version (python-lint-fix)'
    required: false

  # Linter-shared inputs (cache, mode, report format, timeouts, filter lists)
  cache:
    description: 'Enable dependency/build cache (eslint-lint, go-lint, prettier-lint)'
    required: false
  disable-all:
    description: 'Disable all default linters (go-lint)'
    required: false
  disable-linters:
    description: 'Comma-separated linter list to disable (go-lint)'
    required: false
  enable-linters:
    description: 'Comma-separated linter list to enable (go-lint)'
    required: false
  file-extensions:
    description: 'File extensions to lint (eslint-lint)'
    required: false
  file-pattern:
    description: 'File glob pattern to lint (prettier-lint)'
    required: false
  ignore-file:
    description: 'Path to lint-ignore file (eslint-lint, prettier-lint)'
    required: false
  ignore-paths:
    description: 'Comma-separated paths to ignore (compress-images)'
    required: false
  max-warnings:
    description: 'Maximum warnings before failure (eslint-lint)'
    required: false
  mode:
    description: 'Linter mode: check or fix (biome-lint, eslint-lint, prettier-lint)'
    required: false
  only-new-issues:
    description: 'Lint only newly introduced issues (go-lint)'
    required: false
  plugins:
    description: 'Plugin list (prettier-lint)'
    required: false
  report-format:
    description: 'Lint report format (eslint-lint, go-lint, prettier-lint)'
    required: false
  timeout:
    description: 'Lint timeout duration with unit, e.g. 5m (go-lint)'
    required: false

  # Token / credential inputs (npm-publish, npm-semantic-release, docker-publish)
  npm_token:
    description: 'NPM authentication token (npm-publish, npm-semantic-release)'
    required: false
  github_token:
    description: 'GitHub token for semantic-release (npm-semantic-release)'
    required: false
  dockerhub-token:
    description: 'Docker Hub password or token (docker-publish)'
    required: false
  dockerhub-username:
    description: 'Docker Hub username (docker-publish)'
    required: false

  # Docker-publish target inputs (registry selection, tags, platforms, push)
  registry:
    description: 'Target registry: dockerhub, github, or both (docker-publish)'
    required: false
  tags:
    description: 'Image tags to publish (docker-publish)'
    required: false
  platforms:
    description: 'Comma-separated platforms to build for (docker-publish)'
    required: false
  push:
    description: 'Push images after build (docker-publish)'
    required: false

  # Misc action-specific inputs
  composer-args:
    description: 'Extra composer install args (php-tests)'
    required: false
  coverage:
    description: 'Enable code coverage (php-tests)'
    required: false
  destination:
    description: 'Build output destination (go-build)'
    required: false
  extensions:
    description: 'PHP extensions to load (php-tests)'
    required: false
  extra_plugins:
    description: 'Additional semantic-release plugins (npm-semantic-release)'
    required: false
  framework:
    description: 'Test framework: phpunit, pest, etc. (php-tests)'
    required: false
  labels:
    description: 'Path to YAML file with label definitions (sync-labels)'
    required: false
  registry-url:
    description: 'NPM registry URL (npm-publish, npm-semantic-release)'
    required: false
  scope:
    description: 'NPM scope (npm-publish, npm-semantic-release)'
    required: false

outputs:
  validation-status:
    description: 'Overall validation status (success/failure)'
    value: ${{ steps.validate.outputs.status }}
  error-message:
    description: 'Validation error message if failed'
    value: ${{ steps.validate.outputs.error }}
  validation-result:
    description: 'Detailed validation result'
    value: ${{ steps.validate.outputs.result }}
  errors-found:
    description: 'Number of validation errors found'
    value: ${{ steps.validate.outputs.errors }}
  rules-applied:
    description: 'Number of validation rules applied'
    value: ${{ steps.validate.outputs.rules }}

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Install Python dependencies
      shell: sh
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: uv sync --directory "$ACTION_PATH"

    - name: Validate Action Inputs with Python
      id: validate
      shell: sh
      working-directory: ${{ github.action_path }}
      run: uv run validator.py
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_ACTION_TYPE: ${{ inputs.action-type }}
        INPUT_RULES_FILE: ${{ inputs.rules-file }}
        INPUT_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_NAMESPACE: ${{ inputs.namespace }}
        INPUT_EMAIL: ${{ inputs.email }}
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_DOTNET_VERSION: ${{ inputs.dotnet-version }}
        INPUT_TERRAFORM_VERSION: ${{ inputs.terraform-version }}
        INPUT_TFLINT_VERSION: ${{ inputs.tflint-version }}
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
        INPUT_FORCE_VERSION: ${{ inputs.force-version }}
        INPUT_DEFAULT_VERSION: ${{ inputs.default-version }}
        INPUT_IMAGE_NAME: ${{ inputs.image-name }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_ARCHITECTURES: ${{ inputs.architectures }}
        INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
        INPUT_CONTEXT: ${{ inputs.context }}
        INPUT_BUILD_ARGS: ${{ inputs.build-args }}
        INPUT_BUILDX_VERSION: ${{ inputs.buildx-version }}
        INPUT_MAX_RETRIES: ${{ inputs.max-retries }}
        INPUT_IMAGE_QUALITY: ${{ inputs.image-quality }}
        INPUT_PNG_QUALITY: ${{ inputs.png-quality }}
        INPUT_PARALLEL_BUILDS: ${{ inputs.parallel-builds }}
        INPUT_DAYS_BEFORE_STALE: ${{ inputs.days-before-stale }}
        INPUT_DAYS_BEFORE_CLOSE: ${{ inputs.days-before-close }}
        INPUT_PRE_COMMIT_CONFIG: ${{ inputs.pre-commit-config }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_IS_FIXIMUS: ${{ inputs.is-fiximus || inputs.is_fiximus }}
        INPUT_PREFIX: ${{ inputs.prefix }}
        INPUT_LANGUAGE: ${{ inputs.language }}
        INPUT_QUERIES: ${{ inputs.queries }}
        INPUT_PACKS: ${{ inputs.packs }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_BUILD_MODE: ${{ inputs.build-mode }}
        INPUT_SOURCE_ROOT: ${{ inputs.source-root }}
        INPUT_CATEGORY: ${{ inputs.category }}
        INPUT_CHECKOUT_REF: ${{ inputs.checkout-ref }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_UPLOAD_RESULTS: ${{ inputs.upload-results }}
        INPUT_RAM: ${{ inputs.ram }}
        INPUT_THREADS: ${{ inputs.threads }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_SKIP_QUERIES: ${{ inputs.skip-queries }}
        INPUT_ADD_SNIPPETS: ${{ inputs.add-snippets }}
        INPUT_GITLEAKS_LICENSE: ${{ inputs.gitleaks-license }}
        INPUT_GITLEAKS_CONFIG: ${{ inputs.gitleaks-config }}
        INPUT_TRIVY_SEVERITY: ${{ inputs.trivy-severity }}
        INPUT_TRIVY_SCANNERS: ${{ inputs.trivy-scanners }}
        INPUT_TRIVY_TIMEOUT: ${{ inputs.trivy-timeout }}
        INPUT_ACTIONLINT_ENABLED: ${{ inputs.actionlint-enabled }}
        # N-108: env mappings for inputs forwarded by N-095-migrated callers
        INPUT_AUTOPEP8_VERSION: ${{ inputs.autopep8-version }}
        INPUT_ESLINT_VERSION: ${{ inputs.eslint-version }}
        INPUT_FLAKE8_VERSION: ${{ inputs.flake8-version }}
        INPUT_GO_VERSION: ${{ inputs.go-version }}
        INPUT_GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
        INPUT_PACKAGE_VERSION: ${{ inputs.package-version }}
        INPUT_PHP_VERSION: ${{ inputs.php-version }}
        INPUT_PRETTIER_VERSION: ${{ inputs.prettier-version }}
        INPUT_PYTHON_VERSION: ${{ inputs.python-version }}
        INPUT_CACHE: ${{ inputs.cache }}
        INPUT_DISABLE_ALL: ${{ inputs.disable-all }}
        INPUT_DISABLE_LINTERS: ${{ inputs.disable-linters }}
        INPUT_ENABLE_LINTERS: ${{ inputs.enable-linters }}
        INPUT_FILE_EXTENSIONS: ${{ inputs.file-extensions }}
        INPUT_FILE_PATTERN: ${{ inputs.file-pattern }}
        INPUT_IGNORE_FILE: ${{ inputs.ignore-file }}
        INPUT_IGNORE_PATHS: ${{ inputs.ignore-paths }}
        INPUT_MAX_WARNINGS: ${{ inputs.max-warnings }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_ONLY_NEW_ISSUES: ${{ inputs.only-new-issues }}
        INPUT_PLUGINS: ${{ inputs.plugins }}
        INPUT_REPORT_FORMAT: ${{ inputs.report-format }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_NPM_TOKEN: ${{ inputs.npm_token }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_DOCKERHUB_TOKEN: ${{ inputs.dockerhub-token }}
        INPUT_DOCKERHUB_USERNAME: ${{ inputs.dockerhub-username }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_TAGS: ${{ inputs.tags }}
        INPUT_PLATFORMS: ${{ inputs.platforms }}
        INPUT_PUSH: ${{ inputs.push }}
        INPUT_COMPOSER_ARGS: ${{ inputs.composer-args }}
        INPUT_COVERAGE: ${{ inputs.coverage }}
        INPUT_DESTINATION: ${{ inputs.destination }}
        INPUT_EXTENSIONS: ${{ inputs.extensions }}
        INPUT_EXTRA_PLUGINS: ${{ inputs.extra_plugins }}
        INPUT_FRAMEWORK: ${{ inputs.framework }}
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_REGISTRY_URL: ${{ inputs.registry-url }}
        INPUT_SCOPE: ${{ inputs.scope }}
