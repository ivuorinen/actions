# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# permissions:
#   - contents: read          # Required for checking out repository
#   - security-events: write  # Required for uploading SARIF results
---
name: Go Lint Check
description: 'Run golangci-lint with advanced configuration, caching, and reporting'
author: Ismo Vuorinen

branding:
  icon: code
  color: blue

inputs:
  working-directory:
    description: 'Directory containing Go files'
    required: false
    default: '.'
  golangci-lint-version:
    description: 'Version of golangci-lint to use'
    required: false
    default: 'latest'
  go-version:
    description: 'Go version to use'
    required: false
    default: 'stable'
  config-file:
    description: 'Path to golangci-lint config file'
    required: false
    default: '.golangci.yml'
  timeout:
    description: 'Timeout for analysis (e.g., 5m, 1h)'
    required: false
    default: '5m'
  cache:
    description: 'Enable golangci-lint caching'
    required: false
    default: 'true'
  fail-on-error:
    description: 'Fail workflow if issues are found'
    required: false
    default: 'true'
  report-format:
    description: 'Output format (json, sarif, github-actions)'
    required: false
    default: 'sarif'
  max-retries:
    description: 'Maximum number of retry attempts'
    required: false
    default: '3'
  only-new-issues:
    description: 'Report only new issues since main branch'
    required: false
    default: 'true'
  disable-all:
    description: 'Disable all linters (useful with --enable-*)'
    required: false
    default: 'false'
  enable-linters:
    description: 'Comma-separated list of linters to enable'
    required: false
  disable-linters:
    description: 'Comma-separated list of linters to disable'
    required: false
  token:
    description: 'GitHub token for authentication'
    required: false
    default: ''

outputs:
  error-count:
    description: 'Number of errors found'
    value: ${{ steps.lint.outputs.error_count }}
  sarif-file:
    description: 'Path to SARIF report file'
    value: ${{ steps.lint.outputs.sarif_file }}
  cache-hit:
    description: 'Indicates if there was a cache hit'
    value: ${{ steps.cache.outputs.cache-hit }}
  analyzed-files:
    description: 'Number of files analyzed'
    value: ${{ steps.lint.outputs.analyzed_files }}

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: sh
      working-directory: ${{ github.action_path }}
      env:
        INPUT_CACHE: ${{ inputs.cache }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_DISABLE_ALL: ${{ inputs.disable-all }}
        INPUT_DISABLE_LINTERS: ${{ inputs.disable-linters }}
        INPUT_ENABLE_LINTERS: ${{ inputs.enable-linters }}
        INPUT_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
        INPUT_GO_VERSION: ${{ inputs.go-version }}
        INPUT_GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
        INPUT_MAX_RETRIES: ${{ inputs.max-retries }}
        INPUT_ONLY_NEW_ISSUES: ${{ inputs.only-new-issues }}
        INPUT_REPORT_FORMAT: ${{ inputs.report-format }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -eu
        if ! command -v python3 >/dev/null 2>&1; then
          echo "::error::python3 is required to validate inputs"
          exit 1
        fi
        python3 validate.py

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Checkout Repository
      uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta
      with:
        token: ${{ inputs.token || github.token }}

    - name: Cache golangci-lint
      id: cache
      if: inputs.cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cache/golangci-lint
          ~/.cache/go-build
        key: ${{ runner.os }}-golangci-${{ inputs.golangci-lint-version }}-${{ hashFiles('go.sum', inputs.config-file) }}
        restore-keys: |
          ${{ runner.os }}-golangci-${{ inputs.golangci-lint-version }}-

    - name: Install golangci-lint
      shell: sh
      env:
        MAX_RETRIES: ${{ inputs.max-retries }}
        GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
      run: |
        set -eu

        # Function to install golangci-lint with retries
        install_golangci_lint() {
          _attempt=1
          _max_attempts="$MAX_RETRIES"
          _version="$GOLANGCI_LINT_VERSION"

          while [ $_attempt -le $_max_attempts ]; do
            echo "Installation attempt $_attempt of $_max_attempts"

            # Add 'v' prefix if version is not 'latest' and doesn't already have it
            install_version="$_version"
            if [ "$_version" != "latest" ]; then
              case "$_version" in
                v*) ;;
                *) install_version="v$_version" ;;
              esac
            fi

            if go install "github.com/golangci/golangci-lint/cmd/golangci-lint@${install_version}"; then
              return 0
            fi

            _attempt=$((_attempt + 1))
            if [ $_attempt -le $_max_attempts ]; then
              echo "Installation failed, waiting 10 seconds before retry..."
              sleep 10
            fi
          done

          echo "::error::Failed to install golangci-lint after $_max_attempts attempts"
          return 1
        }

        install_golangci_lint

    - name: Prepare Configuration
      id: config
      shell: sh
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        CONFIG_FILE: ${{ inputs.config-file }}
        TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -eu

        cd "$WORKING_DIRECTORY"

        # Create default config if none exists
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "Creating default golangci-lint configuration..."
          cat > "$CONFIG_FILE" <<EOF
        linters:
          enable-all: true
          disable:
            - exhaustivestruct
            - interfacer
            - scopelint
            - maligned

        linters-settings:
          govet:
            check-shadowing: true
          golint:
            min-confidence: 0.8
          gocyclo:
            min-complexity: 15
          dupl:
            threshold: 100
          goconst:
            min-len: 3
            min-occurrences: 3

        issues:
          exclude-use-default: false
          max-issues-per-linter: 0
          max-same-issues: 0
          new: true

        run:
          deadline: $TIMEOUT
          tests: true
          skip-dirs:
            - vendor
            - third_party
        EOF
        fi

    - name: Run golangci-lint
      id: lint
      shell: sh
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        DISABLE_ALL: ${{ inputs.disable-all }}
        ENABLE_LINTERS: ${{ inputs.enable-linters }}
        DISABLE_LINTERS: ${{ inputs.disable-linters }}
        CONFIG_FILE: ${{ inputs.config-file }}
        TIMEOUT: ${{ inputs.timeout }}
        CACHE: ${{ inputs.cache }}
        ONLY_NEW_ISSUES: ${{ inputs.only-new-issues }}
        REPORT_FORMAT: ${{ inputs.report-format }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: |
        set -eu

        cd "$WORKING_DIRECTORY"

        # Create reports directory
        mkdir -p reports

        # Build golangci-lint args as positional parameters
        set -- --config "$CONFIG_FILE" --timeout "$TIMEOUT"

        # Prepare cache flag
        if [ "$CACHE" = "true" ]; then
          set -- "$@" --cache
        else
          set -- "$@" --no-cache
        fi

        # Prepare new issues flag
        if [ "$ONLY_NEW_ISSUES" = "true" ]; then
          set -- "$@" --new
        fi

        # Prepare linter configuration
        if [ "$DISABLE_ALL" = "true" ]; then
          set -- "$@" --disable-all
        fi

        if [ -n "$ENABLE_LINTERS" ]; then
          set -- "$@" "--enable=$ENABLE_LINTERS"
        fi

        if [ -n "$DISABLE_LINTERS" ]; then
          set -- "$@" "--disable=$DISABLE_LINTERS"
        fi

        set -- "$@" --out-format "$REPORT_FORMAT" ./...

        # Run golangci-lint
        echo "Running golangci-lint..."

        result_file="reports/golangci-lint.$REPORT_FORMAT"
        error_count=0
        exit_code=0

        GOLANGCI_LINT_CACHE="$HOME/.cache/golangci-lint" \
        golangci-lint run "$@" > "$result_file" || exit_code=$?

        # Count errors regardless of exit code or fail-on-error setting
        if [ "$exit_code" -ne 0 ]; then
          if [ "$REPORT_FORMAT" = "json" ]; then
            if command -v jq >/dev/null 2>&1; then
              error_count=$(jq '.Issues | length' "$result_file" 2>/dev/null || echo 0)
            else
              echo "::warning::jq not found - falling back to grep for error counting"
              error_count=$(grep -c '"level": "error"' "$result_file" 2>/dev/null || echo 0)
            fi
          else
            error_count=$(grep -c '"level": "error"' "$result_file" || echo 0)
          fi
        fi

        # Always write outputs before any conditional exit
        printf 'error_count=%s\n' "$error_count" >> "$GITHUB_OUTPUT"

        # Count analyzed files
        analyzed_files=$(find . -type f -name "*.go" -not -path "./vendor/*" -not -path "./.git/*" | wc -l)
        printf 'analyzed_files=%s\n' "$analyzed_files" >> "$GITHUB_OUTPUT"
        printf 'sarif_file=%s\n' "$result_file" >> "$GITHUB_OUTPUT"

        if [ "$FAIL_ON_ERROR" = "true" ] && [ "$exit_code" -ne 0 ]; then
          echo "::error::golangci-lint found ${error_count} issues"
          exit $exit_code
        fi

    - name: Upload Lint Results
      if: always() && inputs.report-format == 'sarif'
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: ${{ inputs.working-directory }}/reports/golangci-lint.sarif
        category: golangci-lint

    - name: Cleanup
      if: always()
      shell: sh
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        CACHE: ${{ inputs.cache }}
      run: |-
        set -eu

        cd "$WORKING_DIRECTORY"

        # Remove temporary files
        rm -rf reports/

        # Clean cache if not being preserved
        if [ "$CACHE" != "true" ]; then
          rm -rf ~/.cache/golangci-lint
        fi
