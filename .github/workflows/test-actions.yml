---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test GitHub Actions

on:
  push:
    branches:
      - main
    paths:
      - '*/action.yml'
      - '_tests/**'
      - 'Makefile'
      - '.github/workflows/test-actions.yml'
  pull_request:
    branches:
      - main
    paths:
      - '*/action.yml'
      - '_tests/**'
      - 'Makefile'
      - '.github/workflows/test-actions.yml'
  # checkov:skip=CKV_GHA_7:Test-only workflow; inputs passed through env: blocks, never interpolated directly into shell
  workflow_dispatch:
    inputs:
      test-type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
      action-filter:
        description: 'Filter tests by action name (optional)'
        required: false
        type: string

permissions: {}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      security-events: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment

      - name: Run unit tests
        shell: sh
        env:
          TEST_TYPE: ${{ github.event.inputs.test-type }}
          ACTION_FILTER: ${{ github.event.inputs.action-filter }}
        run: |
          # Validate ACTION_FILTER contains only safe characters
          case "$ACTION_FILTER" in
            *[!a-zA-Z0-9_-]*) echo "::error::Invalid action-filter value"; exit 1 ;;
          esac
          if [ "$TEST_TYPE" = "unit" ] || [ "$TEST_TYPE" = "all" ] || [ -z "$TEST_TYPE" ]; then
            if [ -n "$ACTION_FILTER" ]; then
              make test-action ACTION="$ACTION_FILTER"
            else
              make test-unit
            fi
          else
            echo "Skipping unit tests (test-type: $TEST_TYPE)"
          fi

      - name: Generate SARIF report
        shell: sh
        run: ./_tests/run-tests.sh --type unit --format sarif
        if: always()

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: always() && hashFiles('_tests/reports/test-results.sarif') != ''
        with:
          sarif_file: _tests/reports/test-results.sarif
          category: github-actions-tests

      - name: Upload unit test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: unit-test-results
          path: _tests/reports/unit/
          retention-days: 7
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    timeout-minutes: 20
    if: github.event.inputs.test-type != 'unit'

    steps:
      - name: Checkout repository
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          install-act: 'true'

      - name: Run integration tests
        shell: sh
        env:
          TEST_TYPE: ${{ github.event.inputs.test-type }}
          ACTION_FILTER: ${{ github.event.inputs.action-filter }}
        run: |
          # Validate ACTION_FILTER contains only safe characters
          case "$ACTION_FILTER" in
            *[!a-zA-Z0-9_-]*) echo "::error::Invalid action-filter value"; exit 1 ;;
          esac
          if [ "$TEST_TYPE" = "integration" ] || [ "$TEST_TYPE" = "all" ] || [ -z "$TEST_TYPE" ]; then
            if [ -n "$ACTION_FILTER" ]; then
              ./_tests/run-tests.sh --type integration --action "$ACTION_FILTER"
            else
              make test-integration
            fi
          else
            echo "Skipping integration tests (test-type: $TEST_TYPE)"
          fi

      - name: Check for integration test reports
        id: check-integration-reports
        if: always()
        shell: sh
        run: |
          if [ -d "_tests/reports/integration" ] && [ -n "$(find _tests/reports/integration -type f 2>/dev/null)" ]; then
            printf 'reports-found=%s\n' "true" >> "$GITHUB_OUTPUT"
            echo "Integration test reports found"
          else
            printf 'reports-found=%s\n' "false" >> "$GITHUB_OUTPUT"
            echo "No integration test reports found"
          fi

      - name: Upload integration test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && steps.check-integration-reports.outputs.reports-found == 'true'
        with:
          name: integration-test-results
          path: _tests/reports/integration/
          retention-days: 7
          if-no-files-found: ignore

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    needs:
      - unit-tests
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          install-kcov: 'true'

      - name: Generate coverage report
        run: make test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: _tests/coverage/
          retention-days: 30
          if-no-files-found: warn

      - name: Comment coverage summary
        if: github.event_name == 'pull_request'
        shell: sh
        run: |
          if [ -f _tests/coverage/summary.json ]; then
            coverage=$(jq -r '.coverage_percent' _tests/coverage/summary.json)
            tested_actions=$(jq -r '.tested_actions' _tests/coverage/summary.json)
            total_actions=$(jq -r '.total_actions' _tests/coverage/summary.json)

            cat > coverage_comment.md <<EOF
          ## 📊 Test Coverage Report

          - **Action Coverage**: ${coverage}% (${tested_actions}/${total_actions} actions)
          - **Generated**: $(date)

          EOF

            echo "Coverage: ${coverage}%"
          fi

      - name: Post coverage comment
        if: github.event_name == 'pull_request' && hashFiles('coverage_comment.md') != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('coverage_comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            // Create or update a sticky comment
            const marker = '<!-- coverage-comment -->';
            const list = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = list.data.find(c => c.body && c.body.includes(marker));
            const finalBody = `${marker}\n` + body;
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: finalBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: finalBody });
            }

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          install-kcov: 'true'

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@0f58ae7c5036094a1e3e750d18772af92821b503
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || '' }}
          head: ${{ github.event_name == 'pull_request' && 'HEAD' || '' }}
          extra_args: --debug --only-verified

      - name: Scan shell scripts
        shell: sh
        run: |
          # Scan all shell scripts in _tests/
          find _tests/ -name "*.sh" -exec shellcheck -x {} \; || {
            echo "❌ Shell script security issues found"
            exit 1
          }

          echo "✅ Shell script security scan passed"

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # Required to download artifacts
    needs:
      - unit-tests
      - integration-tests
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*-test-results'
          merge-multiple: true
          path: test-results/

      - name: Generate test summary
        shell: sh
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
        run: |
          {
            echo "## 🧪 Test Results Summary"
            echo ""

            # Unit tests
            unit_count=$(find test-results -type f -path "*/unit/*.txt" | wc -l || true)
            if [ "${unit_count:-0}" -gt 0 ]; then
              echo "- **Unit Tests**: $unit_count action(s) tested"
            fi

            # Integration tests
            integration_count=$(find test-results -type f -path "*/integration/*.txt" | wc -l || true)
            if [ "${integration_count:-0}" -gt 0 ]; then
              echo "- **Integration Tests**: $integration_count action(s) tested"
            fi

            echo ""
            if [ "$UNIT_RESULT" = "success" ] && { [ "$INTEGRATION_RESULT" = "success" ] || [ "$INTEGRATION_RESULT" = "skipped" ]; }; then
              status="✅ All tests passed"
            else
              status="❌ Some tests failed"
            fi
            echo "**Status**: $status"

            # Job status details
            echo ""
            echo "### Job Details"
            echo "- Unit Tests: $UNIT_RESULT"
            echo "- Integration Tests: $INTEGRATION_RESULT"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests failed
        if: needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure'
        shell: sh
        run: |-
          echo "❌ One or more test jobs failed"
          exit 1
