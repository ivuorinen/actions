---
name: Monthly issue metrics
on:
  workflow_dispatch:
  schedule:
    - cron: '3 2 1 * *'

permissions: {}

jobs:
  build:
    name: issue metrics
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Get previous month for the report window
        shell: sh
        run: |
          # Previous month as YYYY-MM, computed portably (no GNU `date -d`,
          # which is forbidden by .claude/rules/posix-shell.md). GitHub issue
          # search treats `created:YYYY-MM` as the entire calendar month, so we
          # do not need an explicit first_day..last_day range.
          year=$(date -u +%Y)
          month=$(date -u +%m)
          month=${month#0} # strip leading zero to avoid octal arithmetic
          if [ "$month" -eq 1 ]; then
            prev_year=$((year - 1))
            prev_month=12
          else
            prev_year=$year
            prev_month=$((month - 1))
          fi
          printf 'last_month=%04d-%02d\n' "$prev_year" "$prev_month" >> "$GITHUB_ENV"

      - name: Run issue-metrics tool
        uses: github/issue-metrics@df8c49d20958f9345281fa2124858bd0ad227e1f # v5.0.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEARCH_QUERY: 'repo:ivuorinen/actions is:issue created:${{ env.last_month }} -reason:"not planned"'

      - name: Create issue
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: Monthly issue metrics report
          token: ${{ secrets.GITHUB_TOKEN }}
          content-filepath: ./issue_metrics.md
