---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Action Security

on:
  push:
    paths:
      - '**/action.yml'
  pull_request:
    paths:
      - '**/action.yml'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze Action Security
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      actions: read
      pull-requests: read
      security-events: write
      statuses: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta
        with:
          fetch-depth: 0

      - name: Run Security Scan
        id: security-scan
        uses: ./security-scan
        with:
          gitleaks-license: ${{ secrets.GITLEAKS_LICENSE }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on Critical Issues
        if: failure() && steps.security-scan.outputs.critical_issues != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          CRITICAL_ISSUES: ${{ steps.security-scan.outputs.critical_issues }}
          TOTAL_ISSUES: ${{ steps.security-scan.outputs.total_issues }}
          HAS_TRIVY_RESULTS: ${{ steps.security-scan.outputs.has_trivy_results }}
          HAS_GITLEAKS_RESULTS: ${{ steps.security-scan.outputs.has_gitleaks_results }}
        with:
          script: |-
            const { repo, owner } = context.repo;
            const critical = process.env.CRITICAL_ISSUES;
            const total = process.env.TOTAL_ISSUES;
            const trivyStatus = process.env.HAS_TRIVY_RESULTS === 'true' ? 'Completed' : 'Skipped/Failed';
            const gitleaksStatus = process.env.HAS_GITLEAKS_RESULTS === 'true' ? 'Completed' : 'Skipped';

            const body = `🚨 Critical security issues found in GitHub Actions

            ${critical} critical security issues (out of ${total} total) were found during the security scan.

            ### Scan Results
            - Actionlint: Completed
            - Trivy: ${trivyStatus}
            - Gitleaks: ${gitleaksStatus}

            [View detailed scan results](https://github.com/${owner}/${repo}/actions/runs/${context.runId})

            Please address these issues immediately.

            > Note: Some security tools might have been skipped due to missing configurations.
            > Check the workflow run for details.`;

            await github.rest.issues.create({
              owner,
              repo,
              title: '🚨 Critical Security Issues in Actions',
              body,
              labels: ['security', 'critical', 'actions'],
              assignees: ['ivuorinen']
            });
