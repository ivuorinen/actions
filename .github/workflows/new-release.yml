---
name: Release Daily State

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *' # 00:00 at Europe/Helsinki

permissions: {}

jobs:
  new-daily-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      created: ${{ steps.daily-version.outputs.created }}
      version: ${{ steps.daily-version.outputs.version }}

    steps:
      - uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta
        with:
          fetch-depth: 0 # Fetch all history and tags for comparison

      - name: Create daily release
        id: daily-version
        run: |
          set -eu

          VERSION="v$(date '+%Y.%m.%d')"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

          # Check if release already exists
          if gh release view "$VERSION" >/dev/null 2>&1; then
            printf 'created=%s\n' "false" >> "$GITHUB_OUTPUT"
            printf '%s\n' "Release $VERSION already exists - skipping"
            exit 0
          fi

          # Get the most recent tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | head -1)

          # Check if there are any changes since the previous tag
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGES=$(git rev-list "$PREVIOUS_TAG"..HEAD --count)
            if [ "$CHANGES" -eq 0 ]; then
              printf 'created=%s\n' "false" >> "$GITHUB_OUTPUT"
              printf '%s\n' "No changes since $PREVIOUS_TAG - skipping release"
              exit 0
            fi
            printf '%s\n' "Found $CHANGES commit(s) since $PREVIOUS_TAG"
          fi

          # Create release with auto-generated changelog (also creates tag)
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --generate-notes \
            --target main

          printf 'created=%s\n' "true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "Created release $VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  provenance:
    needs: new-daily-release
    if: needs.new-daily-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta
        with:
          fetch-depth: 0
          ref: ${{ needs.new-daily-release.outputs.version }}
      - name: Create source archive
        env:
          TAG: ${{ needs.new-daily-release.outputs.version }}
        run: |
          set -eu
          git archive --format=tar.gz --prefix="${TAG}/" HEAD > "${TAG}-source.tar.gz"
          sha256sum "${TAG}-source.tar.gz" > "${TAG}-source.tar.gz.sha256"
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: '${{ needs.new-daily-release.outputs.version }}-source.tar.gz'
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.new-daily-release.outputs.version }}
        run: |
          set -eu
          gh release upload "$TAG" "${TAG}-source.tar.gz" "${TAG}-source.tar.gz.sha256" --clobber

  sbom:
    needs: new-daily-release
    if: needs.new-daily-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta
        with:
          ref: ${{ needs.new-daily-release.outputs.version }}
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.new-daily-release.outputs.version }}
        run: |
          set -eu
          gh release upload "$TAG" sbom.cdx.json --clobber
