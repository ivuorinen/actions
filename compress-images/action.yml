# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# permissions:
#   - contents: write       # Required for creating commits
#   - pull-requests: write  # Required for creating pull requests
---
#
# Compress images on demand (workflow_dispatch), and at 11pm every Sunday (schedule).
# Open a Pull Request if any images can be compressed.
name: Compress Images
description: Compress images on demand (workflow_dispatch), and at 11pm every Sunday (schedule).
author: Ismo Vuorinen

branding:
  icon: image
  color: blue

inputs:
  token:
    description: 'GitHub token for authentication'
    required: false
    default: ${{ github.token }}
  username:
    description: 'GitHub username for commits'
    required: false
    default: 'github-actions'
  email:
    description: 'GitHub email for commits'
    required: false
    default: 'github-actions@github.com'
  working-directory:
    description: 'Directory containing images to compress'
    required: false
    default: '.'
  image-quality:
    description: 'JPEG compression quality (0-100)'
    required: false
    default: '85'
  png-quality:
    description: 'PNG compression quality (0-100)'
    required: false
    default: '95'
  ignore-paths:
    description: 'Paths to ignore during compression (glob patterns)'
    required: false
    default: 'node_modules/**,dist/**,build/**'

outputs:
  images_compressed:
    description: 'Whether any images were compressed (boolean)'
    value: ${{ steps.calibre.outputs.markdown != '' && 'true' || 'false' }}
  compression_report:
    description: 'Markdown report of compression results'
    value: ${{ steps.calibre.outputs.markdown }}

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: sh
      working-directory: ${{ github.action_path }}
      env:
        INPUT_EMAIL: ${{ inputs.email }}
        INPUT_IGNORE_PATHS: ${{ inputs.ignore-paths }}
        INPUT_IMAGE_QUALITY: ${{ inputs.image-quality }}
        INPUT_PNG_QUALITY: ${{ inputs.png-quality }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -eu
        if ! command -v python3 >/dev/null 2>&1; then
          echo "::error::python3 is required to validate inputs"
          exit 1
        fi
        python3 validate.py

    - name: Checkout Repository
      uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta
      with:
        token: ${{ inputs.token }}

    - name: Verify Working Directory
      shell: sh
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -eu

        # Validate working directory exists after checkout
        if [ ! -d "$WORKING_DIRECTORY" ]; then
          echo "::error::Invalid working-directory: '$WORKING_DIRECTORY'. Directory does not exist"
          exit 1
        fi

        # Canonicalize to catch symlinks that resolve outside the workspace
        canon_dir=$(cd -- "$WORKING_DIRECTORY" && pwd -P)
        workspace=$(pwd -P)
        case "$canon_dir" in
          "$workspace"|"$workspace"/*)
            ;;
          *)
            echo "::error::Invalid working-directory: '$WORKING_DIRECTORY'. Resolved path is outside the workspace"
            exit 1
            ;;
        esac

    - name: Compress Images
      id: calibre
      uses: calibreapp/image-actions@9d037c06280028c110ff61c433ad4dc7d33c3c43 # 1.5.0
      with:
        compressOnly: true
        githubToken: ${{ inputs.token }}
        jpegQuality: ${{ inputs.image-quality }}
        pngQuality: ${{ inputs.png-quality }}
        ignorePaths: ${{ inputs.ignore-paths }}
        workingDirectory: ${{ inputs.working-directory }}

    - name: Create New Pull Request If Needed
      if: steps.calibre.outputs.markdown != ''
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ inputs.token }}
        title: 'chore: compress images'
        branch-suffix: timestamp
        commit-message: 'chore: compress images'
        body: ${{ steps.calibre.outputs.markdown }}
