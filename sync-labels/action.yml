# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# permissions:
#   - issues: write # Required for syncing labels (and PAT for cross-repo sync)
---
name: Sync labels
description: Sync GitHub labels declaratively from a YAML/JSON manifest (no Docker)
author: Ismo Vuorinen

branding:
  icon: tag
  color: blue

inputs:
  labels:
    description: "Path to the labels manifest (YAML or JSON), relative to the repository root. Defaults to .github/labels.yml when omitted (no longer the action's bundled labels.yml). A missing manifest is a warning + successful no-op, not an error."
    required: false
    default: ''
  repository:
    description: 'Newline-separated list of owner/repo targets. Defaults to the current repository. Cross-repo sync requires a PAT in the token input.'
    required: false
    default: ''
  prune:
    description: 'Delete existing labels that are not listed in the manifest'
    required: false
    default: 'true'
  token:
    description: 'GitHub token for authentication (use a PAT for cross-repo sync)'
    required: false
    default: ${{ github.token }}

outputs:
  created:
    description: 'Number of labels created'
    value: ${{ steps.sync.outputs.created }}
  updated:
    description: 'Number of labels updated'
    value: ${{ steps.sync.outputs.updated }}
  deleted:
    description: 'Number of labels deleted (pruned)'
    value: ${{ steps.sync.outputs.deleted }}
  unchanged:
    description: 'Number of labels left unchanged'
    value: ${{ steps.sync.outputs.unchanged }}
  repositories:
    description: 'Number of repositories synced'
    value: ${{ steps.sync.outputs.repositories }}

runs:
  using: 'composite'
  steps:
    - name: Mask token
      shell: sh
      env:
        INPUT_TOKEN: ${{ inputs.token }}
      run: |
        set -eu
        printf '::add-mask::%s\n' "$INPUT_TOKEN"

    - name: Validate Inputs
      shell: sh
      working-directory: ${{ github.action_path }}
      env:
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PRUNE: ${{ inputs.prune }}
        INPUT_TOKEN: ${{ inputs.token }}
      run: |
        set -eu
        if ! command -v python3 >/dev/null 2>&1; then
          echo "::error::python3 is required to validate inputs"
          exit 1
        fi
        python3 validate.py

    - name: Sync Labels
      id: sync
      shell: sh
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PRUNE: ${{ inputs.prune }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -eu
        command -v gh >/dev/null 2>&1 || { echo "::error::gh CLI is required to sync labels"; exit 1; }
        command -v python3 >/dev/null 2>&1 || { echo "::error::python3 is required to sync labels"; exit 1; }
        # Run from the repository checkout so a relative manifest path resolves
        # against the consumer's workspace; the script itself lives in the action.
        python3 "${ACTION_PATH}/sync.py"
