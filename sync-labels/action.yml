# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# permissions:
#   - issues: write # Required for syncing labels
---
name: Sync labels
description: Sync labels from a YAML file to a GitHub repository
author: Ismo Vuorinen

branding:
  icon: tag
  color: blue

inputs:
  labels:
    description: 'Path to the labels YAML file'
    required: false
  token:
    description: 'GitHub token for authentication'
    required: false
    default: ${{ github.token }}

outputs:
  labels:
    description: 'Path to the labels YAML file'
    value: ${{ inputs.labels }}

runs:
  using: 'composite'
  steps:
    - name: Validate Inputs
      shell: sh
      working-directory: ${{ github.action_path }}
      env:
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_TOKEN: ${{ inputs.token }}
      run: |
        set -eu
        if ! command -v python3 >/dev/null 2>&1; then
          echo "::error::python3 is required to validate inputs"
          exit 1
        fi
        python3 validate.py

    - name: Run Label Syncer
      uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1.3.0
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      with:
        manifest: ${{ inputs.labels || format('{0}/labels.yml', github.action_path) }}
