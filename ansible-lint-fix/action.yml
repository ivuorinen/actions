# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# permissions:
#   - contents: write          # Required for committing and pushing fixes
#   - security-events: write   # Required for uploading SARIF results
---
name: Ansible Lint and Fix
description: 'Lints and fixes Ansible playbooks, commits changes, and uploads SARIF report.'
author: 'Ismo Vuorinen'

branding:
  icon: 'play'
  color: 'green'

inputs:
  token:
    description: 'GitHub token for authentication'
    required: false
    default: ''
  username:
    description: 'GitHub username for commits'
    required: false
    default: 'github-actions'
  email:
    description: 'GitHub email for commits'
    required: false
    default: 'github-actions@github.com'
  max-retries:
    description: 'Maximum number of retry attempts for pip install operations'
    required: false
    default: '3'

outputs:
  files_changed:
    description: 'Number of files changed by linting'
    value: ${{ steps.lint.outputs.files_changed }}
  lint_status:
    description: 'Linting status (success/failure)'
    value: ${{ steps.lint.outputs.status }}
  sarif_path:
    description: 'Path to SARIF report file'
    value: 'ansible-lint.sarif'

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: sh
      working-directory: ${{ github.action_path }}
      env:
        INPUT_EMAIL: ${{ inputs.email }}
        INPUT_MAX_RETRIES: ${{ inputs.max-retries }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_USERNAME: ${{ inputs.username }}
      run: |
        set -eu
        if ! command -v python3 >/dev/null 2>&1; then
          echo "::error::python3 is required to validate inputs"
          exit 1
        fi
        python3 validate.py

    - name: Checkout Repository
      uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6-beta
      with:
        token: ${{ inputs.token || github.token }}
        # git-auto-commit-action pushes the auto-fix commit using the token that
        # actions/checkout persists in .git/config; persist-credentials must stay
        # true or the "Commit Fixes" step cannot authenticate its push.
        persist-credentials: true # zizmor: ignore[artipacked]

    - name: Check for Ansible Files
      id: check-files
      shell: sh
      run: |
        set -eu

        # Detect Ansible-specific indicators rather than any YAML file
        _has_ansible=false

        # Check for Ansible config or canonical entry-point files
        if find . \( -name "ansible.cfg" -o -name "site.yml" -o -name "playbook.yml" \) -type f | grep -q .; then
          _has_ansible=true
        fi

        # Check for Ansible-specific directories
        if [ "$_has_ansible" = "false" ] && find . \( -name "roles" -o -name "playbooks" -o -name "tasks" -o -name "handlers" \) -type d | grep -q .; then
          _has_ansible=true
        fi

        # Check YAML content for Ansible play syntax
        if [ "$_has_ansible" = "false" ] && find . \( -name "*.yml" -o -name "*.yaml" \) -type f | xargs grep -l "^- hosts:\|^  hosts:" 2>/dev/null | grep -q .; then
          _has_ansible=true
        fi

        if [ "$_has_ansible" = "true" ]; then
          printf 'files_found=%s\n' "true" >> "$GITHUB_OUTPUT"
          echo "Found Ansible files, proceeding with lint and fix."
        else
          printf 'files_found=%s\n' "false" >> "$GITHUB_OUTPUT"
          echo "No Ansible files detected. Skipping lint and fix."
        fi

    - name: Setup Python
      if: steps.check-files.outputs.files_found == 'true'
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install ansible-lint
      id: install-ansible-lint
      if: steps.check-files.outputs.files_found == 'true'
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 5
        max_attempts: ${{ inputs.max-retries }}
        command: 'pip install ansible-lint==6.22.1'

    - name: Run ansible-lint
      if: steps.check-files.outputs.files_found == 'true'
      id: lint
      shell: sh
      run: |
        set -eu

        # Run ansible-lint and capture exit code
        if ansible-lint --write --format sarif > ansible-lint.sarif; then
          lint_exit_code=0
        else
          lint_exit_code=$?
        fi

        # Count files changed by linting
        files_changed=$(git diff --name-only | wc -l | tr -d '[:space:]')

        # Determine lint status
        if [ "$lint_exit_code" -eq 0 ]; then
          lint_status="success"
        else
          lint_status="failure"
        fi

        # Write outputs to GITHUB_OUTPUT
        printf 'files_changed=%s\n' "$files_changed" >> "$GITHUB_OUTPUT"
        printf 'status=%s\n' "$lint_status" >> "$GITHUB_OUTPUT"

        # Exit with the original ansible-lint exit code
        exit "$lint_exit_code"

    - name: Commit Fixes
      if: steps.check-files.outputs.files_found == 'true'
      uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
      with:
        commit_message: 'style: apply ansible lint fixes'
        commit_user_name: ${{ inputs.username }}
        commit_user_email: ${{ inputs.email }}

    - name: Upload SARIF Report
      if: steps.check-files.outputs.files_found == 'true'
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: ansible-lint.sarif
